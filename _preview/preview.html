<!doctype html><meta charset="utf-8"><style>html,body{margin:0;background:#070b16}</style>
<canvas id="c" width="920" height="360"></canvas>
<script type="module">
import { CLASSES, CLASS_ORDER, FACTIONS } from '../js/core/constants.js';
import { drawDrone } from '../js/ui/DroneArt.js';
import { shadowEllipse } from '../js/core/utils.js';
const ctx=document.getElementById('c').getContext('2d');
ctx.fillStyle='#070b16';ctx.fillRect(0,0,920,360);
const bg=ctx.createRadialGradient(460,180,60,460,180,520);bg.addColorStop(0,'rgba(20,40,70,0.35)');bg.addColorStop(1,'rgba(4,6,14,0)');ctx.fillStyle=bg;ctx.fillRect(0,0,920,360);
ctx.fillStyle='#8ea6c8';ctx.font='14px system-ui';ctx.textAlign='center';ctx.fillText('REDESIGNED IN-GAME TOP-DOWN DRONES',460,34);
CLASS_ORDER.forEach((id,i)=>{const x=140+i*220,y=180,color=FACTIONS[i].color;shadowEllipse(ctx,x,y+18,26,10,0.34);ctx.save();ctx.translate(x,y);drawDrone(ctx,CLASSES[id],color,26,-Math.PI/2+0.35,1234);ctx.restore();ctx.fillStyle=CLASSES[id].accent;ctx.font='13px system-ui';ctx.fillText(CLASSES[id].name,x,y+70);});
</script>
